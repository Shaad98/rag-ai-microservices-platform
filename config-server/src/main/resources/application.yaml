spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/Shaad98/rag-config-repo.git
          default-label: main
          clone-on-start: false
          force-pull: true

server:
  port: 8888

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
                
        include: "*"  # health,info,refresh
  endpoint:
    shutdown:
      access: UNRESTRICTED
    health:
      show-details: always
  
  health:
    defaults:
      enabled: true
    